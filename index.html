<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fallout Lockpick Minigame</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/lockpick.css">
</head>
<body>

  <h1>Fallout Lockpick</h1>
  <p class="subtitle">VAULT-TEC SECURITY BYPASS SYSTEM v2.0</p>

  <div class="difficulty-bar">
    <button data-diff="EASY">Easy</button>
    <button data-diff="MEDIUM" class="active">Medium</button>
    <button data-diff="HARD">Hard</button>
    <button data-diff="VERY">Very Hard</button>
  </div>

  <div class="fallout-lockpick-container">
    <div class="lockpick-scene">
      <div class="lock-cylinder"></div>
      <div class="lockpick-dial" id="dial">
        <div class="dial-rotor" id="dialRotor"></div>
        <div class="lockpick-pick" id="pick"></div>
        <img src="inner-lock.png" class="inner-lock" id="innerLock" alt="">
        <img src="outer-lock.png" class="outer-lock" alt="">
      </div>
      <div class="angle-display" id="angleDisplay">90°</div>
    </div>

    <div class="lockpick-controls">
      <div class="wear-container">
        <label>Bobby Pin Condition</label>
        <div class="wear-bar"><div class="wear-bar-fill" id="wearBar"></div></div>
      </div>
      <!-- Turning Force (hidden visually, kept for JS) -->
      <div class="force-container" style="display:none">
        <label>Turning Force</label>
        <div class="force-bar"><div class="force-bar-fill" id="forceBar"></div></div>
      </div>
      <button class="lockpick-wrench" id="wrench">
        <i class="fas fa-wrench"></i>
        <span>Hold to Turn</span>
      </button>
      <div class="status-text" id="statusText">Find the sweet spot...</div>
      <p class="hint-text">DRAG dial to aim &nbsp;|&nbsp; SCROLL to nudge &nbsp;|&nbsp; HOLD button to turn</p>
    </div>
  </div>

  <footer>
    Built for <a href="https://github.com/Ram-Rod6198" target="_blank">Ram-Rod6198</a> &mdash;
    Foundry VTT module ported to standalone JS/CSS
  </footer>

  <script src="js/lockpick.js"></script>
</body>
</html>
